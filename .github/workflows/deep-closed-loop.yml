name: deep-closed-loop

# On-demand deep run of the closed loop (transcribe . synthesize ~ id, R9.1): a large, unpinned-seed
# RANDOM sample. This is NOT a gate and NOT scheduled. The everyday guard is the push CI, which runs
# the closed loop at 40 pinned, deterministic seeds (strict R9.2) in ~1.5 min. Press "Run workflow"
# to fuzz a large corpus before a release, or when Phase-2 detection work resumes and discovery
# matters again.
#
# It runs STRICT: at ~1000 cases it is EXPECTED to surface the rare PRE-EXISTING pitch/count residual
# (a YIN octave error or a dropped-note onset miss -- NOT a duration or corpus problem; see
# DECISIONS.md, "Step 9 -- The closed loop"). On a failure it uploads the quarantined MIDI+WAV for
# triage and promotion into fixtures/regressions/ (R9.3) -- surfacing those cases IS the point of a
# manual deep run, not a signal that the build is broken.
#
# History: this was a daily schedule ("nightly-closed-loop") during development; retired to on-demand
# once detection froze for v0.1.x, because a schedule only re-measured a constant residual on frozen,
# deterministic code (DECISIONS.md, "CI -- nightly closed-loop retired to an on-demand deep run").
on:
  workflow_dispatch: {}

jobs:
  closed-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Deep closed loop (large random corpus)
        run: dotnet test --filter "Category=Slow"
        env:
          CLOSED_LOOP_CASES: "1000"
      - name: Upload quarantine artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: closed-loop-quarantine
          path: artifacts/closed-loop-quarantine/
